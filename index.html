<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
        <title>SpyderAI</title>
        
        <link rel="stylesheet" crossorigin href="https://9a6cf1b8.nova-whitelabel-v2.pages.dev/assets/index-BbY2eo65.css">

        <style>
            /* Force Dark Mode Overrides */
            :root {
                color-scheme: dark;
            }
            
            body {
                background-color: #0f0f0f !important;
                color: #ffffff !important;
            }

            /* Hiding login/auth elements if the external JS tries to render them */
            #login-container, .auth-modal, .login-button, [href*="login"], [href*="sign-up"] {
                display: none !important;
            }

            /* Custom SpyderAI Branding */
            #root::before {
                content: "SpyderAI";
                position: absolute;
                top: 10px;
                left: 20px;
                font-weight: bold;
                font-size: 1.2rem;
                color: #ff3e3e; /* Spider-red accent */
                z-index: 9999;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="module" crossorigin src="https://9a6cf1b8.nova-whitelabel-v2.pages.dev/assets/index-Duxq5UMa.js"></script>

        <script>
            // Post-load adjustments to ensure "Nova" is replaced by "SpyderAI"
            window.addEventListener('load', () => {
                document.title = "SpyderAI";
                
                // MutationObserver to catch dynamically rendered text by the React/Vue app
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach(() => {
                        if (document.body.innerText.includes("Nova")) {
                            document.body.innerHTML = document.body.innerHTML.replace(/Nova/g, 'SpyderAI');
                        }
                    });
                });

                observer.observe(document.body, { childList: true, subtree: true });
            });
        </script>
    </body>
</html>
